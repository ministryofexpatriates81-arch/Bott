name: Build Android APK

on:
  push:
    branches:
      - main # main বা master ব্রাঞ্চে কোড পুশ করলেই অ্যাপ তৈরি শুরু হবে
  workflow_dispatch: # ম্যানুয়ালি রান করার অপশন

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install

      - name: Initialize Capacitor Android Project
        run: |
          npx cap add android
          npx cap sync android

      - name: Inject Android Permissions (Camera, Mic, Storage)
        run: |
          # AndroidManifest.xml ফাইলে WebRTC (ভিডিও/অডিও কল) এর জন্য প্রয়োজনীয় পারমিশন যুক্ত করা হচ্ছে
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          sed -i '/<application/i \
          <uses-permission android:name="android.permission.INTERNET" />\n\
          <uses-permission android:name="android.permission.CAMERA" />\n\
          <uses-permission android:name="android.permission.RECORD_AUDIO" />\n\
          <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\n\
          <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n\
          <uses-feature android:name="android.hardware.camera" android:required="false" />\n\
          <uses-feature android:name="android.hardware.camera.front" android:required="false" />' $MANIFEST_PATH

      - name: Build APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: WhatsApp-App-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
